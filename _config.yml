title: Data Science Study Notes
author: Kelin Zhong
repository:
  url: https://github.com/KelinZhong/StudyNotes

execute:
  execute_notebooks: "off"

html:
  use_repository_button: true
  home_page_in_navbar: true

sphinx:
  config:
    html_theme: pydata_sphinx_theme
    html_theme_options:
      # This is the "magic" fix: it forces all navigation to the sidebar
      header_links_before_dropdown: 0
      
      # Ensures the sidebar starts collapsed but is easy to open
      collapse_navigation: true
      show_nav_level: 1
      navigation_depth: 4
      
      # Keeps the top bar clean with just your search and icons
      navbar_center: ["navbar-nav"] # This will now be empty due to the setting above
      navbar_end: ["theme-switcher", "navbar-icon-links"]