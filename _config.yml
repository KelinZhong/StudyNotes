title: Data Science Study Notes
author: Kelin Zhong
repository:
  url: https://github.com/KelinZhong/StudyNotes

execute:
  execute_notebooks: "off"

html:
  use_repository_button: true
  home_page_in_navbar: true

sphinx:
  config:
    html_theme: pydata_sphinx_theme
    html_theme_options:
      # 1. Clear the center and end of the navbar to remove links from the top
      navbar_center: []
      navbar_end: ["theme-switcher", "navbar-icon-links"]
      
      # 2. Force the sidebar to show the first two levels of navigation
      show_nav_level: 2
      navigation_depth: 4
      
      # 3. Ensure the sidebar is collapsible
      collapse_navigation: true
      
      # Optional: Add your GitHub link to the icons section
      icon_links:
        - name: GitHub
          url: https://github.com/KelinZhong/StudyNotes
          icon: fab fa-github-square